name: Publicar Reporte de Mercados

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [publicar-mercados]

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restaurar sitio completo
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd site
          zip -r ../site.zip *.html
          cd ..
          echo "Archivos en ZIP:"
          unzip -l site.zip
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/grupoestrategika/deployments" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -F "file=@site.zip")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Actualizar reporte de mercados
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: python publicar_mercados_v4.py
        continue-on-error: true
