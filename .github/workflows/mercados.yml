name: Publicar Sitio Grupo Estrategika

on:
  push:
    branches: [main]
    paths: ['site/**']
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [publicar-mercados]

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Wrangler
        run: npm install -g wrangler

      - name: Publicar sitio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler pages deploy site/ --project-name=grupoestrategika --branch=main --commit-dirty=true
