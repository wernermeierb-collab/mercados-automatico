name: Publicar Reporte de Mercados

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8:00 AM Lima (UTC-5) lunes a viernes
  workflow_dispatch:          # manual desde GitHub
  repository_dispatch:        # webhook desde Cowork
    types: [publicar-mercados]

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Publicar reporte
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: python publicar_mercados_v4.py
